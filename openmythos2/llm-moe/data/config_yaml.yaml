# YAML/TOML Training Data
# Infrastructure as Code, CI/CD, and Kubernetes configurations.

---
# ═══════════════════════════════════════════════════════════════════════
# Docker Compose — Multi-service application
# ═══════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NODE_ENV: production
    image: myapp:latest
    container_name: myapp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:pass@postgres:5432/mydb
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: myapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: myapp-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  backend:
    driver: bridge

---
# ═══════════════════════════════════════════════════════════════════════
# Kubernetes Deployment
# ═══════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference
  namespace: production
  labels:
    app: ml-inference
    version: v2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-inference
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: ml-inference-sa
      containers:
        - name: inference
          image: registry.example.com/ml/inference:v2.3.1
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          env:
            - name: MODEL_PATH
              value: /models/transformer-moe
            - name: MAX_BATCH_SIZE
              value: "32"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ml-secrets
                  key: db-password
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

---
# ═══════════════════════════════════════════════════════════════════════
# GitHub Actions CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff mypy
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src/

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[test]"
      - name: Test
        run: pytest --cov=src --cov-report=xml -v
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/postgres
      - name: Upload coverage
        uses: codecov/codecov-action@v3

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/ml-inference \
            inference=ghcr.io/${{ github.repository }}:${{ github.sha }} \
            --namespace production
          kubectl rollout status deployment/ml-inference --namespace production

---
# ═══════════════════════════════════════════════════════════════════════
# Terraform Configuration (HCL-like in YAML)
# ═══════════════════════════════════════════════════════════════════════
# Note: actual HCL uses different syntax, but this teaches
# infrastructure patterns in a familiar format.

infrastructure:
  provider: aws
  region: us-east-1

  vpc:
    cidr: "10.0.0.0/16"
    subnets:
      public:
        - cidr: "10.0.1.0/24"
          az: us-east-1a
        - cidr: "10.0.2.0/24"
          az: us-east-1b
      private:
        - cidr: "10.0.10.0/24"
          az: us-east-1a
        - cidr: "10.0.11.0/24"
          az: us-east-1b

  rds:
    engine: postgres
    version: "16.1"
    instance_class: db.r6g.xlarge
    storage:
      type: gp3
      size_gb: 100
      iops: 3000
    multi_az: true
    backup:
      retention_days: 30
      window: "03:00-04:00"
    monitoring:
      enhanced: true
      interval: 60

  ecs:
    cluster: ml-cluster
    services:
      - name: inference-api
        task_definition:
          cpu: 4096
          memory: 8192
          gpu: 1
          containers:
            - name: inference
              image: "${ECR_REPO}:latest"
              port_mappings:
                - container_port: 8080
                  host_port: 8080
        desired_count: 3
        auto_scaling:
          min: 2
          max: 10
          target_cpu: 60
          scale_in_cooldown: 300
          scale_out_cooldown: 60
